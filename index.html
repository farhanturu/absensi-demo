<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Absensi Karyawan — Sistem Manajemen Absensi</title>
<meta name="description" content="Sistem Absensi Karyawan dengan Geofencing, Real-time Map, dan Dashboard Lengkap">
<meta name="theme-color" content="#0c0f1a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%233b82f6'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='system-ui' font-weight='bold'>A</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0f1a;--bg2:#111827;--surface:#1a1f35;--surface2:#232942;--surface-hover:#2a3150;--border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);--text:#f0f2f8;--dim:#8892b0;--muted:#5a6380;--primary:#3b82f6;--primary-hover:#2563eb;--primary-bg:rgba(59,130,246,0.12);--primary-glow:rgba(59,130,246,0.25);--green:#10b981;--green-bg:rgba(16,185,129,0.12);--red:#ef4444;--red-bg:rgba(239,68,68,0.12);--amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);--purple:#8b5cf6;--purple-bg:rgba(139,92,246,0.12);--radius:14px;--radius-sm:10px;--radius-xs:6px;--shadow:0 8px 32px rgba(0,0,0,0.4);--font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}

.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 30% 20%,rgba(59,130,246,0.08),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(139,92,246,0.06),transparent 50%),var(--bg)}
.login-card{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 40px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--purple))}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo svg{width:56px;height:56px;margin-bottom:16px}
.login-logo h1{font-size:24px;font-weight:800;letter-spacing:-0.02em}
.login-logo p{font-size:13px;color:var(--dim);margin-top:4px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em}
.form-input{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font);transition:all 0.2s;outline:none}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-bg)}
.form-input::placeholder{color:var(--muted)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all 0.2s;border:none;outline:none;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--primary);color:#fff;width:100%;box-shadow:0 4px 16px var(--primary-glow)}
.btn-primary:hover{background:var(--primary-hover);box-shadow:0 6px 24px var(--primary-glow)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--surface-hover);border-color:var(--border-hover)}
.btn-sm{padding:10px 18px;font-size:12px}
.login-footer{text-align:center;margin-top:24px;font-size:12px;color:var(--muted);line-height:1.8}
.login-footer strong{color:var(--dim)}

.app{display:flex;min-height:100vh}
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;transition:transform 0.3s cubic-bezier(0.16,1,0.3,1)}
.sidebar-header{padding:24px;border-bottom:1px solid var(--border)}
.sidebar-brand{display:flex;align-items:center;gap:14px}
.sidebar-brand svg{width:40px;height:40px}
.sidebar-brand h2{font-size:16px;font-weight:800;letter-spacing:-0.01em}
.sidebar-brand span{font-size:11px;color:var(--dim);display:block;margin-top:1px}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);padding:16px 12px 8px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);color:var(--dim);font-size:13px;font-weight:600;transition:all 0.15s;cursor:pointer;margin-bottom:2px;text-decoration:none}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-item.active{background:var(--primary-bg);color:var(--primary)}
.nav-item svg{width:20px;height:20px;flex-shrink:0;opacity:0.7}
.nav-item.active svg{opacity:1}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:12px;padding:10px;border-radius:var(--radius-sm);transition:background 0.15s}
.user-card:hover{background:rgba(255,255,255,0.03)}
.user-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--muted)}
.main{flex:1;margin-left:280px;padding:28px 36px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.topbar h1{font-size:26px;font-weight:800;letter-spacing:-0.02em}
.topbar-right{display:flex;gap:8px;align-items:center}
.mobile-toggle{display:none;position:fixed;top:16px;left:16px;z-index:60;width:44px;height:44px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:20px;align-items:center;justify-content:center}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;transition:all 0.2s}
.stat:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.stat-val{font-size:32px;font-weight:800;line-height:1;letter-spacing:-0.02em}
.stat-label{font-size:12px;color:var(--dim);margin-top:6px;font-weight:500}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.card-title{font-size:16px;font-weight:700}
.card-body{padding:22px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

.clock-wrap{text-align:center;padding:48px 24px}
.clock-time{font-size:72px;font-weight:800;font-family:var(--mono);letter-spacing:-0.03em;background:linear-gradient(135deg,var(--primary),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.clock-date{font-size:15px;color:var(--dim);margin-bottom:36px;font-weight:500}
.clock-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:700;margin-bottom:28px}
.clock-badge.in{background:var(--green-bg);color:var(--green)}
.clock-badge.out{background:var(--amber-bg);color:var(--amber)}
.clock-badge .dot{width:8px;height:8px;border-radius:50%;background:currentColor}
.clock-badge.in .dot{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.clock-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.clock-btn{padding:18px 40px;border-radius:var(--radius);font-size:17px;font-weight:800;cursor:pointer;transition:all 0.2s;border:none;font-family:var(--font);letter-spacing:-0.01em}
.clock-btn:active{transform:scale(0.96)}
.clock-btn.in{background:var(--green);color:#fff;box-shadow:0 6px 24px rgba(16,185,129,0.3)}
.clock-btn.in:hover{background:#059669;box-shadow:0 8px 32px rgba(16,185,129,0.4)}
.clock-btn.out{background:var(--red);color:#fff;box-shadow:0 6px 24px rgba(239,68,68,0.3)}
.clock-btn.out:hover{background:#dc2626}
.clock-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}

.map-container{height:300px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);margin-top:16px}
.map-container .leaflet-container{height:100%;background:var(--bg2)}
.location-info{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap}
.loc-tag{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);font-size:12px;font-weight:600;color:var(--dim)}
.loc-tag svg{width:14px;height:14px;color:var(--primary)}
.loc-tag.ok{border-color:rgba(16,185,129,0.3);color:var(--green)}
.loc-tag.fail{border-color:rgba(239,68,68,0.3);color:var(--red)}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:14px 18px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:14px 18px;font-size:13px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700}
.badge-present{background:var(--green-bg);color:var(--green)}
.badge-late{background:var(--amber-bg);color:var(--amber)}
.badge-absent{background:var(--red-bg);color:var(--red)}
.badge-pending{background:var(--amber-bg);color:var(--amber)}
.badge-approved{background:var(--green-bg);color:var(--green)}
.badge-rejected{background:var(--red-bg);color:var(--red)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.6);transform:translateY(24px) scale(0.97);transition:transform 0.25s cubic-bezier(0.16,1,0.3,1)}
.modal-bg.show .modal{transform:translateY(0) scale(1)}
.modal-top{display:flex;align-items:center;justify-content:space-between;padding:22px 26px;border-bottom:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:800}
.modal-x{width:36px;height:36px;border-radius:10px;background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.modal-content{padding:26px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;padding:18px 26px;border-top:1px solid var(--border)}

.toast{position:fixed;top:20px;right:20px;padding:16px 22px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;z-index:200;animation:toastIn 0.35s cubic-bezier(0.16,1,0.3,1);display:none;box-shadow:var(--shadow)}
.toast.show{display:flex;align-items:center;gap:10px}
.toast-ok{background:var(--green);color:#fff}
.toast-err{background:var(--red);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-day{text-align:center;padding:14px 8px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);transition:all 0.15s}
.cal-day:hover{border-color:var(--border-hover)}
.cal-day .d-label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:0.05em}
.cal-day .d-num{font-size:20px;font-weight:800;margin:6px 0 4px}
.cal-day .d-val{font-size:10px;font-weight:700}
.cal-day.present{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.04)}
.cal-day.present .d-val{color:var(--green)}
.cal-day.late{border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.04)}
.cal-day.late .d-val{color:var(--amber)}

.settings-group{margin-bottom:24px}
.settings-label{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.settings-row{display:flex;gap:12px;align-items:end;flex-wrap:wrap}
.settings-row .form-group{flex:1;min-width:140px}

.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty .icon{font-size:48px;margin-bottom:12px;opacity:0.4}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:280px}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:72px 16px 24px}
  .mobile-toggle{display:flex}
  .stats-row{grid-template-columns:1fr 1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .clock-time{font-size:48px}
  .topbar h1{font-size:20px}
  .cal-grid{gap:4px}
  .cal-day{padding:10px 4px}
  .cal-day .d-num{font-size:16px}
}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DB='absensi_v2';
function initDB(){const d=localStorage.getItem(DB);if(d)return JSON.parse(d);const db={users:[{id:1,name:'Admin Utama',email:'admin@company.com',pw:'admin123',role:'admin',dept:'HRD',pos:'HR Manager'},{id:2,name:'Budi Santoso',email:'budi@company.com',pw:'password123',role:'employee',dept:'Engineering',pos:'Software Developer'},{id:3,name:'Siti Rahayu',email:'siti@company.com',pw:'password123',role:'employee',dept:'Marketing',pos:'Marketing Specialist'},{id:4,name:'Andi Pratama',email:'andi@company.com',pw:'password123',role:'employee',dept:'Engineering',pos:'Frontend Developer'},{id:5,name:'Dewi Lestari',email:'dewi@company.com',pw:'password123',role:'employee',dept:'Finance',pos:'Accountant'},{id:6,name:'Rizki Ramadhan',email:'rizki@company.com',pw:'password123',role:'employee',dept:'Engineering',pos:'Backend Developer'},{id:7,name:'Maya Putri',email:'maya@company.com',pw:'password123',role:'employee',dept:'HRD',pos:'Recruiter'},{id:8,name:'Fajar Nugroho',email:'fajar@company.com',pw:'password123',role:'employee',dept:'Operations',pos:'Project Manager'}],attendance:[],leaves:[],settings:{officeLat:-6.2088,officeLng:106.8456,officeName:'Kantor Pusat Jakarta',radius:500,nextId:9},secrets:{}};const t=new Date().toISOString().split('T')[0];const y=new Date(Date.now()-864e5).toISOString().split('T')[0];for(let i=2;i<=8;i++){db.attendance.push({id:i-1,uid:i,date:t,ci:'08:00:00',co:null,status:'present',lat:-6.209+Math.random()*0.002,lng:106.846+Math.random()*0.002});db.attendance.push({id:i+6,uid:i,date:y,ci:'08:05:00',co:'17:00:00',status:'present'})}localStorage.setItem(DB,JSON.stringify(db));return db}
let db=initDB();let me=null;const $=s=>document.querySelector(s);const $$=s=>document.querySelectorAll(s);
function save(){localStorage.setItem(DB,JSON.stringify(db))}
function toast(m,t='ok'){$('#toast')?.remove();const el=document.createElement('div');el.id='toast';el.className=`toast toast-${t} show`;el.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="${t==='ok'?'M20 6L9 17l-5-5':'M18 6L6 18M6 6l12 12'}"/></svg>${m}`;document.body.appendChild(el);setTimeout(()=>el.remove(),3500)}
function fmtD(d){return new Date(d).toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function fmtT(t){return t?t.substring(0,5):'-'}
function dist(lat1,lng1,lat2,lng2){const R=6371e3;const p=Math.PI/180;const a=0.5-Math.cos((lat2-lat1)*p)/2+Math.cos(lat1*p)*Math.cos(lat2*p)*(1-Math.cos((lng2-lng1)*p))/2;return R*2*Math.asin(Math.sqrt(a))}
const logo=`<svg viewBox="0 0 40 40" fill="none"><defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs><rect width="40" height="40" rx="12" fill="url(#lg)"/><text x="20" y="27" text-anchor="middle" fill="white" font-size="18" font-weight="800" font-family="system-ui">A</text></svg>`;

function renderLogin(){$('#app').innerHTML=`<div class="login-page"><div class="login-card"><div class="login-logo">${logo}<h1>Absensi Karyawan</h1><p>Sistem manajemen absensi dengan geofencing</p></div><form id="f"><div class="form-group"><label class="form-label">Email</label><input class="form-input" id="e" type="email" value="admin@company.com" placeholder="email@company.com" required></div><div class="form-group"><label class="form-label">Password</label><input class="form-input" id="p" type="password" value="admin123" placeholder="Masukkan password" required></div><button class="btn btn-primary" type="submit">Masuk</button></form><div class="login-footer"><strong>Admin:</strong> admin@company.com / admin123<br><strong>User:</strong> budi@company.com / password123</div></div></div>`;$('#f').onsubmit=e=>{e.preventDefault();const u=db.users.find(u=>u.email===$('#e').value&&u.pw===$('#p').value);if(!u)return toast('Email atau password salah','err');me=u;renderApp()}}

function renderApp(){const ad=me.role==='admin';$('#app').innerHTML=`<div class="app"><button class="mobile-toggle" onclick="$('.sidebar').classList.toggle('open')">☰</button><aside class="sidebar"><div class="sidebar-header"><div class="sidebar-brand">${logo}<div><h2>Absensi</h2><span>v2.0 Geofencing</span></div></div></div><nav class="sidebar-nav"><div class="nav-label">Menu Utama</div><a class="nav-item active" data-p="dash" onclick="go('dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a><a class="nav-item" data-p="absen" onclick="go('absen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Absen</a><a class="nav-item" data-p="riwayat" onclick="go('riwayat')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>Riwayat</a><a class="nav-item" data-p="cuti" onclick="go('cuti')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Cuti</a>${ad?`<div class="nav-label">Admin</div><a class="nav-item" data-p="lapor" onclick="go('lapor')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>Laporan</a><a class="nav-item" data-p="karyawan" onclick="go('karyawan')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Karyawan</a><a class="nav-item" data-p="setting" onclick="go('setting')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Pengaturan</a>`:''}</nav><div class="sidebar-footer"><div class="user-card" onclick="doLogout()"><div class="user-avatar">${me.name.charAt(0)}</div><div class="user-info"><div class="user-name">${me.name}</div><div class="user-role">${me.pos||me.role}</div></div><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></div></div></aside><main class="main"><div id="pc"></div></main></div><div class="modal-bg" id="mbg" onclick="closeM()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-top"><h3 class="modal-title" id="mt"></h3><button class="modal-x" onclick="closeM()">✕</button></div><div class="modal-content" id="mc"></div><div class="modal-actions" id="ma"></div></div></div>`;go('dash')}

function go(p){$$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.p===p));$('.sidebar')?.classList.remove('open');({dash:rDash,absen:rAbsen,riwayat:rRiwayat,cuti:rCuti,lapor:rLapor,karyawan:rKar,setting:rSet})[p]?.()}

function rDash(){const t=new Date().toISOString().split('T')[0];const ad=me.role==='admin';const rec=db.attendance.find(a=>a.uid===me.id&&a.date===t);const m=new Date().getMonth()+1;const y=new Date().getFullYear();const mr=db.attendance.filter(a=>a.uid===me.id&&new Date(a.date).getMonth()+1===m&&new Date(a.date).getFullYear()===y);let h=`<div class="topbar"><h1>Dashboard</h1></div>`;if(ad){const te=db.users.filter(u=>u.role==='employee').length;const pt=db.attendance.filter(a=>a.date===t&&a.ci).length;const late=db.attendance.filter(a=>a.date===t&&a.ci>'08:00:00').length;h+=`<div class="stats-row"><div class="stat"><div class="stat-top"><div class="stat-icon" style="background:var(--primary-bg);color:var(--primary)">👥</div></div><div class="stat-val">${te}</div><div class="stat-label">Total Karyawan</div></div><div class="stat"><div class="stat-top"><div class="stat-icon" style="background:var(--green-bg);color:var(--green)">✓</div></div><div class="stat-val">${pt}</div><div class="stat-label">Hadir Hari Ini</div></div><div class="stat"><div class="stat-top"><div class="stat-icon" style="background:var(--amber-bg);color:var(--amber)">⏰</div></div><div class="stat-val">${late}</div><div class="stat-label">Terlambat</div></div><div class="stat"><div class="stat-top"><div class="stat-icon" style="background:var(--red-bg);color:var(--red)">✕</div></div><div class="stat-val">${te-pt}</div><div class="stat-label">Tidak Hadir</div></div></div>`}else{const pres=mr.filter(a=>a.status==='present').length;const late=mr.filter(a=>a.status==='late').length;h+=`<div class="stats-row"><div class="stat"><div class="stat-top"><div class="stat-icon" style="background:var(--green-bg);color:var(--green)">✓</div></div><div class="stat-val">${pres}</div><div class="stat-label">Hadir</div></div><div class="stat"><div class="stat-top"><div class="stat-icon" style="background:var(--amber-bg);color:var(--amber)">⏰</div></div><div class="stat-val">${late}</div><div class="stat-label">Terlambat</div></div><div class="stat"><div class="stat-top"><div class="stat-icon" style="background:var(--purple-bg);color:var(--purple)">🏖</div></div><div class="stat-val">${db.leaves.filter(l=>l.uid===me.id).length}</div><div class="stat-label">Cuti</div></div></div>`}h+=`<div class="grid-2"><div class="card"><div class="card-head"><span class="card-title">Status Hari Ini</span></div><div class="card-body" style="text-align:center;padding:32px 20px"><div style="font-size:56px;margin-bottom:12px">${rec?'✅':'⏳'}</div><div style="font-size:20px;font-weight:800;margin-bottom:6px">${rec?'Sudah Absen':'Belum Absen'}</div><div style="font-size:13px;color:var(--dim)">${rec?`Check-in ${fmtT(rec.ci)}${rec.co?' · Check-out '+fmtT(rec.co):''}`:'Buka menu Absen untuk check-in'}</div></div></div><div class="card"><div class="card-head"><span class="card-title">Riwayat Terakhir</span></div><div class="card-body">${db.attendance.filter(a=>a.uid===me.id).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5).map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:700">${fmtD(r.date)}</div><div style="font-size:11px;color:var(--muted)">${fmtT(r.ci)} → ${fmtT(r.co)||'...'}</div></div><span class="badge badge-${r.status}">${r.status}</span></div>`).join('')||'<div class="empty"><div class="icon">📋</div><p>Belum ada riwayat</p></div>'}</div></div></div>`;$('#pc').innerHTML=h}

function rAbsen(){const t=new Date().toISOString().split('T')[0];const rec=db.attendance.find(a=>a.uid===me.id&&a.date===t);const s=db.settings;let h=`<div class="topbar"><h1>Absen</h1></div><div class="card"><div class="card-body"><div class="clock-wrap"><div class="clock-time" id="ct">${new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div><div class="clock-date">${fmtD(new Date())}</div><div class="clock-badge ${rec?'in':'out'}"><span class="dot"></span>${rec?'Sudah Check-in':'Belum Check-in'}</div><div class="clock-btns">${!rec?`<button class="clock-btn in" onclick="doIn()">Check In</button>`:!rec.co?`<button class="clock-btn out" onclick="doOut()">Check Out</button>`:'<div style="color:var(--dim);font-size:14px;font-weight:600">Absen hari ini selesai ✓</div>'}</div></div></div></div>`;h+=`<div class="card" style="margin-top:20px"><div class="card-head"><span class="card-title">📍 Lokasi & Geofencing</span><span class="badge ${rec?'badge-present':'badge-pending'}" id="locBadge">Memeriksa...</span></div><div class="card-body"><div id="mapBox" class="map-container"></div><div class="location-info" id="locInfo"></div></div></div>`;if(rec)h+=`<div class="card" style="margin-top:20px"><div class="card-head"><span class="card-title">Detail Absen</span></div><div class="card-body"><div class="grid-3"><div class="stat" style="text-align:center"><div class="stat-label">Check In</div><div style="font-size:22px;font-weight:800;margin-top:6px">${fmtT(rec.ci)}</div></div><div class="stat" style="text-align:center"><div class="stat-label">Check Out</div><div style="font-size:22px;font-weight:800;margin-top:6px">${fmtT(rec.co)}</div></div><div class="stat" style="text-align:center"><div class="stat-label">Status</div><div style="margin-top:8px"><span class="badge badge-${rec.status}">${rec.status}</span></div></div></div></div></div>`;$('#pc').innerHTML=h;setTimeout(()=>initMap(rec),100);clearInterval(window._clk);window._clk=setInterval(()=>{const e=$('#ct');if(e)e.textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000)}

let mapInst=null;
function initMap(rec){if(mapInst){mapInst.remove();mapInst=null}const s=db.settings;const el=$('#mapBox');if(!el)return;mapInst=L.map(el,{zoomControl:false}).setView([s.officeLat,s.officeLng],15);L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(mapInst);L.control.zoom({position:'topright'}).addTo(mapInst);L.circle([s.officeLat,s.officeLng],{radius:s.radius,color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:0.08,weight:2,dashArray:'6 4'}).addTo(mapInst);L.marker([s.officeLat,s.officeLng]).addTo(mapInst).bindPopup(`<b>${s.officeName}</b><br>Radius: ${s.radius}m`);if(rec&&rec.lat&&rec.lng){L.circleMarker([rec.lat,rec.lng],{radius:8,color:'#10b981',fillColor:'#10b981',fillOpacity:0.8,weight:2}).addTo(mapInst).bindPopup('Lokasi check-in Anda');mapInst.fitBounds([[s.officeLat,s.officeLng],[rec.lat,rec.lng]],{padding:[40,40]})}else{mapInst.setView([s.officeLat,s.officeLng],15)}setTimeout(()=>mapInst.invalidateSize(),200);checkLoc()}

function checkLoc(){const s=db.settings;if(!navigator.geolocation){$('#locBadge').textContent='GPS tidak tersedia';$('#locBadge').className='badge badge-rejected';$('#locInfo').innerHTML='<div class="loc-tag fail">GPS tidak didukung browser ini</div>';return}$('#locBadge').textContent='Mendapatkan lokasi...';navigator.geolocation.getCurrentPosition(p=>{const d=dist(p.coords.latitude,p.coords.longitude,s.officeLat,s.officeLng);const ok=d<=s.radius;$('#locBadge').textContent=ok?'Dalam radius':'Di luar radius';$('#locBadge').className=`badge ${ok?'badge-present':'badge-rejected'}`;$('#locInfo').innerHTML=`<div class="loc-tag ${ok?'ok':'fail'}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${Math.round(d)}m dari kantor</div><div class="loc-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Radius: ${s.radius}m</div>`;if(mapInst){L.circleMarker([p.coords.latitude,p.coords.longitude],{radius:6,color:'#10b981',fillColor:'#10b981',fillOpacity:0.9,weight:2}).addTo(mapInst).bindPopup('Lokasi Anda saat ini')}},e=>{$('#locBadge').textContent='Izin lokasi ditolak';$('#locBadge').className='badge badge-rejected';$('#locInfo').innerHTML='<div class="loc-tag fail">Aktifkan izin lokasi di browser</div>'},{enableHighAccuracy:true,timeout:10000})}

function doIn(){const s=db.settings;if(!navigator.geolocation){toast('Aktifkan GPS untuk check-in','err');return}navigator.geolocation.getCurrentPosition(p=>{const d=dist(p.coords.latitude,p.coords.longitude,s.officeLat,s.officeLng);if(d>s.radius){toast(`Anda ${Math.round(d)}m dari kantor. Radius: ${s.radius}m`,'err');return}const t=new Date().toISOString().split('T')[0];const now=new Date().toTimeString().split(' ')[0];db.attendance.push({id:Date.now(),uid:me.id,date:t,ci:now,co:null,status:now>'08:00:00'?'late':'present',lat:p.coords.latitude,lng:p.coords.longitude});save();toast('Check-in berhasil!');rAbsen()},()=>toast('Gagal mendapatkan lokasi','err'),{enableHighAccuracy:true})}

function doOut(){const t=new Date().toISOString().split('T')[0];const now=new Date().toTimeString().split(' ')[0];const r=db.attendance.find(a=>a.uid===me.id&&a.date===t);if(r){r.co=now;save();toast('Check-out berhasil!');rAbsen()}}

function rRiwayat(){const now=new Date();const m=now.getMonth()+1;const y=now.getFullYear();const recs=db.attendance.filter(a=>a.uid===me.id&&new Date(a.date).getMonth()+1===m&&new Date(a.date).getFullYear()===y).sort((a,b)=>b.date.localeCompare(a.date));let h=`<div class="topbar"><h1>Riwayat</h1></div><div class="card"><div class="card-head"><span class="card-title">${now.toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</span></div><div class="card-body">`;if(!recs.length)h+=`<div class="empty"><div class="icon">📋</div><p>Belum ada riwayat bulan ini</p></div>`;else{const wk={};recs.forEach(r=>{const d=new Date(r.date);const ws=new Date(d);ws.setDate(d.getDate()-d.getDay());const k=ws.toISOString().split('T')[0];if(!wk[k])wk[k]=[];wk[k].push(r)});const dn=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];Object.entries(wk).forEach(([ws,days])=>{h+=`<div style="margin-bottom:24px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:700;margin-bottom:10px">Minggu ${ws}</div><div class="cal-grid">`;for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);const ds=d.toISOString().split('T')[0];const rec=days.find(r=>r.date===ds);const isT=ds===now.toISOString().split('T')[0];h+=`<div class="cal-day ${rec?rec.status:''}" ${isT?'style="border-color:var(--primary)"':''}><div class="d-label">${dn[i]}</div><div class="d-num">${d.getDate()}</div><div class="d-val">${rec?(rec.ci?fmtT(rec.ci):rec.status):''}</div></div>`}h+=`</div></div>`})}h+=`</div></div>`;$('#pc').innerHTML=h}

function rCuti(){const recs=db.leaves.filter(l=>l.uid===me.id);let h=`<div class="topbar"><h1>Cuti</h1><div class="topbar-right"><button class="btn btn-primary btn-sm" onclick="showLeaveM()">+ Ajukan</button></div></div><div class="card"><div class="card-body"><div class="table-wrap"><table><thead><tr><th>Jenis</th><th>Dari</th><th>Sampai</th><th>Alasan</th><th>Status</th></tr></thead><tbody>${!recs.length?'<tr><td colspan="5" class="empty" style="padding:40px">Belum ada pengajuan</td></tr>':''}${recs.map(r=>`<tr><td style="font-weight:700">${r.type}</td><td>${r.sd}</td><td>${r.ed}</td><td style="color:var(--dim)">${r.reason||'-'}</td><td><span class="badge badge-${r.status}">${r.status}</span></td></tr>`).join('')}</tbody></table></div></div></div>`;$('#pc').innerHTML=h}

function showLeaveM(){$('#mt').textContent='Ajukan Cuti';$('#mc').innerHTML=`<div class="form-group"><label class="form-label">Jenis Cuti</label><select class="form-input" id="lt"><option>Cuti Tahunan</option><option>Cuti Sakit</option><option>Cuti Melahirkan</option><option>Cuti Urusan Penting</option></select></div><div class="form-group"><label class="form-label">Dari Tanggal</label><input type="date" class="form-input" id="ls"></div><div class="form-group"><label class="form-label">Sampai Tanggal</label><input type="date" class="form-input" id="le"></div><div class="form-group"><label class="form-label">Alasan</label><textarea class="form-input" id="lr" rows="3" placeholder="Alasan cuti..."></textarea></div>`;$('#ma').innerHTML=`<button class="btn btn-outline btn-sm" onclick="closeM()">Batal</button><button class="btn btn-primary btn-sm" onclick="subLeave()">Kirim</button>`;$('#mbg').classList.add('show')}

function subLeave(){db.leaves.push({id:Date.now(),uid:me.id,type:$('#lt').value,sd:$('#ls').value,ed:$('#le').value,reason:$('#lr').value,status:'pending'});save();closeM();toast('Pengajuan cuti berhasil!');rCuti()}

function rLapor(){const t=new Date().toISOString().split('T')[0];let h=`<div class="topbar"><h1>Laporan Absensi</h1></div><div style="display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap"><input type="date" class="form-input" id="rptD" value="${t}" style="max-width:220px" onchange="loadRpt()"><a href="#" onclick="exportCSV()" class="btn btn-outline btn-sm" style="text-decoration:none">📥 Export CSV</a></div><div class="card"><div class="card-body"><div class="table-wrap"><table><thead><tr><th>Nama</th><th>Dept</th><th>Posisi</th><th>Check In</th><th>Check Out</th><th>Status</th><th>Lokasi</th></tr></thead><tbody id="rptBody">${rptRows(t)}</tbody></table></div></div></div>`;$('#pc').innerHTML=h}

function rptRows(d){const recs=db.attendance.filter(a=>a.date===d);if(!recs.length)return'<tr><td colspan="7" class="empty" style="padding:40px">Tidak ada data</td></tr>';return recs.map(r=>{const u=db.users.find(u=>u.id===r.uid);const d=r.lat&&r.lng?dist(r.lat,r.lng,db.settings.officeLat,db.settings.officeLng):null;return`<tr><td style="font-weight:700">${u?.name||'?'}</td><td>${u?.dept||'-'}</td><td style="color:var(--dim)">${u?.pos||'-'}</td><td>${fmtT(r.ci)}</td><td>${fmtT(r.co)}</td><td><span class="badge badge-${r.status}">${r.status}</span></td><td>${d!==null?`<span style="color:${d<=db.settings.radius?'var(--green)':'var(--red)'}">${Math.round(d)}m</span>`:'-'}</td></tr>`}).join('')}

function loadRpt(){$('#rptBody').innerHTML=rptRows($('#rptD').value)}

function exportCSV(){const m=new Date().getMonth()+1;const y=new Date().getFullYear();const recs=db.attendance.filter(a=>new Date(a.date).getMonth()+1===m&&new Date(a.date).getFullYear()===y);let csv='Nama,Department,Position,Date,Check In,Check Out,Status\n';recs.forEach(r=>{const u=db.users.find(u=>u.id===r.uid);csv+=`"${u?.name||''}","${u?.dept||''}","${u?.pos||''}","${r.date}","${r.ci||''}","${r.co||''}","${r.status}"\n`});const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`absensi-${m}-${y}.csv`;a.click()}

function rKar(){const us=db.users;let h=`<div class="topbar"><h1>Karyawan</h1><div class="topbar-right"><button class="btn btn-primary btn-sm" onclick="showAddM()">+ Tambah</button></div></div><div class="card"><div class="card-body"><div class="table-wrap"><table><thead><tr><th>Nama</th><th>Email</th><th>Dept</th><th>Posisi</th><th>Role</th><th>Aksi</th></tr></thead><tbody>${us.map(u=>`<tr><td style="font-weight:700">${u.name}</td><td style="color:var(--dim)">${u.email}</td><td>${u.dept}</td><td>${u.pos}</td><td><span class="badge ${u.role==='admin'?'badge-approved':'badge-present'}">${u.role}</span></td><td><button class="btn btn-outline btn-sm" onclick='showEditM(${JSON.stringify(u)})'>Edit</button> ${u.id!==me.id?`<button class="btn btn-danger btn-sm" onclick="delU(${u.id})">Hapus</button>`:''}</td></tr>`).join('')}</tbody></table></div></div></div>`;$('#pc').innerHTML=h}

function showAddM(){$('#mt').textContent='Tambah Karyawan';$('#mc').innerHTML=`<div class="form-group"><label class="form-label">Nama</label><input class="form-input" id="en" placeholder="Nama lengkap"></div><div class="form-group"><label class="form-label">Email</label><input class="form-input" id="ee" type="email" placeholder="email@company.com"></div><div class="form-group"><label class="form-label">Password</label><input class="form-input" id="ep" type="password" placeholder="Password"></div><div class="form-group"><label class="form-label">Department</label><input class="form-input" id="ed" placeholder="Engineering, Marketing..."></div><div class="form-group"><label class="form-label">Posisi</label><input class="form-input" id="epos" placeholder="Software Developer"></div>`;$('#ma').innerHTML=`<button class="btn btn-outline btn-sm" onclick="closeM()">Batal</button><button class="btn btn-primary btn-sm" onclick="addU()">Tambah</button>`;$('#mbg').classList.add('show')}

function addU(){db.users.push({id:db.settings.nextId++,name:$('#en').value,email:$('#ee').value,pw:$('#ep').value,role:'employee',dept:$('#ed').value,pos:$('#epos').value});save();closeM();toast('Karyawan ditambahkan!');rKar()}

function showEditM(u){$('#mt').textContent='Edit Karyawan';$('#mc').innerHTML=`<div class="form-group"><label class="form-label">Nama</label><input class="form-input" id="en" value="${u.name}"></div><div class="form-group"><label class="form-label">Email</label><input class="form-input" id="ee" value="${u.email}"></div><div class="form-group"><label class="form-label">Department</label><input class="form-input" id="ed" value="${u.dept}"></div><div class="form-group"><label class="form-label">Posisi</label><input class="form-input" id="epos" value="${u.pos}"></div><div class="form-group"><label class="form-label">Role</label><select class="form-input" id="er"><option value="employee" ${u.role==='employee'?'selected':''}>Employee</option><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option></select></div>`;$('#ma').innerHTML=`<button class="btn btn-outline btn-sm" onclick="closeM()">Batal</button><button class="btn btn-primary btn-sm" onclick="updU(${u.id})">Simpan</button>`;$('#mbg').classList.add('show')}

function updU(id){const u=db.users.find(u=>u.id===id);if(u){u.name=$('#en').value;u.email=$('#ee').value;u.dept=$('#ed').value;u.pos=$('#epos').value;u.role=$('#er').value;save();closeM();toast('Karyawan diperbarui!');rKar()}}

function delU(id){if(!confirm('Hapus karyawan ini?'))return;db.users=db.users.filter(u=>u.id!==id);db.attendance=db.attendance.filter(a=>a.uid!==id);save();toast('Karyawan dihapus!');rKar()}

function rSet(){const s=db.settings;let h=`<div class="topbar"><h1>Pengaturan</h1></div><div class="card"><div class="card-head"><span class="card-title">📍 Pengaturan Lokasi & Geofencing</span></div><div class="card-body"><div class="settings-group"><div class="settings-label"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Titik Kantor</div><div id="setMap" class="map-container" style="height:250px"></div><div class="settings-row" style="margin-top:14px"><div class="form-group"><label class="form-label">Latitude</label><input class="form-input" id="sLat" value="${s.officeLat}" type="number" step="any"></div><div class="form-group"><label class="form-label">Longitude</label><input class="form-input" id="sLng" value="${s.officeLng}" type="number" step="any"></div><div class="form-group"><label class="form-label">Nama Lokasi</label><input class="form-input" id="sName" value="${s.officeName}"></div></div></div><div class="settings-group"><div class="settings-label"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Radius Geofencing</div><div class="settings-row"><div class="form-group"><label class="form-label">Radius (meter)</label><input class="form-input" id="sRad" value="${s.radius}" type="number" min="50" max="5000"></div><div class="form-group" style="flex:0"><label class="form-label">&nbsp;</label><button class="btn btn-primary btn-sm" onclick="saveSet()" style="width:auto">Simpan Pengaturan</button></div></div></div></div></div>`;$('#pc').innerHTML=h;setTimeout(()=>{const m=L.map('setMap',{zoomControl:false}).setView([s.officeLat,s.officeLng],15);L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(m);L.control.zoom({position:'topright'}).addTo(m);let c=L.circle([s.officeLat,s.officeLng],{radius:s.radius,color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:0.08,weight:2,dashArray:'6 4'}).addTo(m);L.marker([s.officeLat,s.officeLng]).addTo(m).bindPopup(s.officeName);m.on('click',e=>{$('#sLat').value=e.latlng.lat.toFixed(6);$('#sLng').value=e.latlng.lng.toFixed(6);m.setView(e.latlng,16);c.setLatLng(e.latlng);c.setRadius(parseInt($('#sRad').value)||500)});$('#sRad').oninput=()=>c.setRadius(parseInt($('#sRad').value)||500);setTimeout(()=>m.invalidateSize(),200)},100)}

function saveSet(){db.settings.officeLat=parseFloat($('#sLat').value);db.settings.officeLng=parseFloat($('#sLng').value);db.settings.officeName=$('#sName').value;db.settings.radius=parseInt($('#sRad').value)||500;save();toast('Pengaturan tersimpan!');rSet()}

function closeM(){$('#mbg').classList.remove('show')}
function doLogout(){me=null;clearInterval(window._clk);renderLogin()}
renderLogin();
</script>
</body>
</html>
