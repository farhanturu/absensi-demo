<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Karyawan — Demo</title>
<meta name="description" content="Sistem Absensi Karyawan — Demo Lengkap">
<meta name="theme-color" content="#0f172a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--bg2:#1e293b;--surface:#1e293b;--surface-hover:#273548;--border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.15);--text:#f1f5f9;--dim:#94a3b8;--muted:#64748b;--primary:#3b82f6;--primary-hover:#2563eb;--primary-bg:rgba(59,130,246,0.1);--green:#22c55e;--green-bg:rgba(34,197,94,0.1);--red:#ef4444;--red-bg:rgba(239,68,68,0.1);--amber:#f59e0b;--amber-bg:rgba(245,158,11,0.1);--purple:#a855f7;--purple-bg:rgba(168,85,247,0.1);--radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.3);--font:'Inter',system-ui,sans-serif}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:var(--shadow)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo .icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--purple));display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px}
.auth-logo h1{font-size:22px;font-weight:800}
.auth-logo p{font-size:13px;color:var(--dim);margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
.form-input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font);transition:all 0.15s;outline:none}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all 0.15s;border:none;outline:none}
.btn-primary{background:var(--primary);color:#fff;width:100%}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,0.4)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--surface-hover)}
.btn-sm{padding:8px 16px;font-size:12px}
.btn-icon{width:40px;height:40px;padding:0;border-radius:var(--radius-sm)}
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--dim)}
.app-layout{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;transition:transform 0.3s}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-brand{display:flex;align-items:center;gap:12px}
.sidebar-brand .icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:18px}
.sidebar-brand h2{font-size:15px;font-weight:700}
.sidebar-brand span{font-size:11px;color:var(--dim);display:block}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);padding:12px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);color:var(--dim);text-decoration:none;font-size:13px;font-weight:500;transition:all 0.15s;cursor:pointer;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.nav-item.active{background:var(--primary-bg);color:var(--primary)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--primary));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--dim)}
.main-content{flex:1;margin-left:260px;padding:24px 32px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.topbar h1{font-size:24px;font-weight:800}
.topbar-actions{display:flex;gap:8px}
.mobile-menu{display:none;position:fixed;top:16px;left:16px;z-index:60;width:40px;height:40px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:18px}
.page{display:none}.page.active{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all 0.2s}
.stat-card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.stat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-value{font-size:28px;font-weight:800;line-height:1}
.stat-label{font-size:12px;color:var(--dim);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700}
.card-body{padding:20px}
.attendance-clock{text-align:center;padding:40px 20px}
.clock-time{font-size:64px;font-weight:800;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,var(--primary),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.clock-date{font-size:16px;color:var(--dim);margin-bottom:32px}
.clock-status{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:24px}
.clock-status.checked-in{background:var(--green-bg);color:var(--green)}
.clock-status.not-in{background:var(--amber-bg);color:var(--amber)}
.clock-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.clock-btn{padding:16px 32px;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;border:none;font-family:var(--font)}
.clock-btn.checkin{background:var(--green);color:#fff}
.clock-btn.checkin:hover{background:#16a34a;transform:translateY(-2px);box-shadow:0 8px 24px rgba(34,197,94,0.3)}
.clock-btn.checkout{background:var(--red);color:#fff}
.clock-btn.checkout:hover{background:#dc2626;transform:translateY(-2px);box-shadow:0 8px 24px rgba(239,68,68,0.3)}
.table-container{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:12px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover{background:rgba(255,255,255,0.02)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-present{background:var(--green-bg);color:var(--green)}
.badge-late{background:var(--amber-bg);color:var(--amber)}
.badge-absent{background:var(--red-bg);color:var(--red)}
.badge-pending{background:var(--amber-bg);color:var(--amber)}
.badge-approved{background:var(--green-bg);color:var(--green)}
.badge-rejected{background:var(--red-bg);color:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5);transform:translateY(20px);transition:transform 0.2s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:8px;background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.modal-body{padding:24px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border)}
.toast{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:200;animation:slideIn 0.3s ease;display:none}
.toast.show{display:block}
.toast-success{background:var(--green);color:#fff}
.toast-error{background:var(--red);color:#fff}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.history-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:16px}
.history-day{text-align:center;padding:12px 8px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)}
.history-day .day-name{font-size:10px;color:var(--muted);text-transform:uppercase}
.history-day .day-num{font-size:18px;font-weight:700;margin:4px 0}
.history-day .day-status{font-size:10px;font-weight:600}
.history-day.present{border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.05)}
.history-day.present .day-status{color:var(--green)}
.history-day.late{border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.05)}
.history-day.late .day-status{color:var(--amber)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.filter-bar select,.filter-bar input{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--primary)}
.demo-banner{background:linear-gradient(90deg,var(--primary),var(--purple));color:#fff;text-align:center;padding:8px;font-size:12px;font-weight:600}
.demo-banner a{color:#fff;text-decoration:underline}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0;padding:16px;padding-top:64px}.mobile-menu{display:flex;align-items:center;justify-content:center}.stats-grid{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}.clock-time{font-size:40px}}
</style>
</head>
<body>
<div class="demo-banner">📌 Demo Mode — Data tersimpan di browser (localStorage). <a href="https://github.com/farhanturu/absensi-karyawan">Lihat Full Version →</a></div>
<div id="app"></div>
<script>
const DB_KEY='absensi_db';
function getDB(){const d=localStorage.getItem(DB_KEY);if(d)return JSON.parse(d);const db={users:[{id:1,name:'Admin Utama',email:'admin@company.com',password:'admin123',role:'admin',department:'HRD',position:'HR Manager'},{id:2,name:'Budi Santoso',email:'budi@company.com',password:'password123',role:'employee',department:'Engineering',position:'Software Developer'},{id:3,name:'Siti Rahayu',email:'siti@company.com',password:'password123',role:'employee',department:'Marketing',position:'Marketing Specialist'},{id:4,name:'Andi Pratama',email:'andi@company.com',password:'password123',role:'employee',department:'Engineering',position:'Frontend Developer'},{id:5,name:'Dewi Lestari',email:'dewi@company.com',password:'password123',role:'employee',department:'Finance',position:'Accountant'},{id:6,name:'Rizki Ramadhan',email:'rizki@company.com',password:'password123',role:'employee',department:'Engineering',position:'Backend Developer'},{id:7,name:'Maya Putri',email:'maya@company.com',password:'password123',role:'employee',department:'HRD',position:'Recruiter'},{id:8,name:'Fajar Nugroho',email:'fajar@company.com',password:'password123',role:'employee',department:'Operations',position:'Project Manager'}],attendance:[],leaves:[],nextId:9};const today=new Date().toISOString().split('T')[0];const yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];for(let i=2;i<=8;i++){db.attendance.push({id:i-1,userId:i,date:today,checkIn:'08:00:00',checkOut:null,status:'present'});db.attendance.push({id:i+6,userId:i,date:yesterday,checkIn:'08:05:00',checkOut:'17:00:00',status:'present'})}localStorage.setItem(DB_KEY,JSON.stringify(db));return db}
function saveDB(db){localStorage.setItem(DB_KEY,JSON.stringify(db))}
let currentUser=null;let db=getDB();
const $=s=>document.querySelector(s);const $$=s=>document.querySelectorAll(s);
function toast(m,t='success'){let el=$('#toast');if(!el){el=document.createElement('div');el.id='toast';el.className='toast';document.body.appendChild(el)}el.textContent=m;el.className=`toast toast-${t} show`;setTimeout(()=>el.classList.remove('show'),3000)}
function fmtDate(d){return new Date(d).toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
function fmtTime(t){return t?t.substring(0,5):'-'}
function renderLogin(){$('#app').innerHTML=`<div class="auth-page"><div class="auth-card"><div class="auth-logo"><div class="icon">🏢</div><h1>Absensi Karyawan</h1><p>Sistem manajemen absensi online</p></div><form id="loginForm"><div class="form-group"><label>Email</label><input type="email" class="form-input" id="loginEmail" placeholder="email@company.com" value="admin@company.com" required></div><div class="form-group"><label>Password</label><input type="password" class="form-input" id="loginPassword" placeholder="Masukkan password" value="admin123" required></div><button type="submit" class="btn btn-primary">Masuk</button></form><div class="auth-footer"><p>Demo: <strong>admin@company.com</strong> / <strong>admin123</strong></p><p style="margin-top:4px">User: <strong>budi@company.com</strong> / <strong>password123</strong></p></div></div></div>`;$('#loginForm').onsubmit=e=>{e.preventDefault();const u=db.users.find(u=>u.email===$('#loginEmail').value&&u.password===$('#loginPassword').value);if(!u){toast('Email atau password salah','error');return}currentUser=u;renderApp()}}
function renderApp(){const isAdmin=currentUser.role==='admin';$('#app').innerHTML=`<div class="demo-banner">📌 Demo Mode — Data tersimpan di browser. <a href="https://github.com/farhanturu/absensi-karyawan">Full Version →</a></div><button class="mobile-menu" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button><div class="app-layout"><aside class="sidebar"><div class="sidebar-header"><div class="sidebar-brand"><div class="icon">🏢</div><div><h2>Absensi</h2><span>v1.0 Demo</span></div></div></div><nav class="sidebar-nav"><div class="nav-section">Menu</div><a class="nav-item active" data-page="dashboard" onclick="nav('dashboard')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a><a class="nav-item" data-page="absen" onclick="nav('absen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Absen</a><a class="nav-item" data-page="riwayat" onclick="nav('riwayat')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>Riwayat</a><a class="nav-item" data-page="cuti" onclick="nav('cuti')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Cuti</a>${isAdmin?`<div class="nav-section">Admin</div><a class="nav-item" data-page="laporan" onclick="nav('laporan')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>Laporan</a><a class="nav-item" data-page="karyawan" onclick="nav('karyawan')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Karyawan</a>`:''}</nav><div class="sidebar-footer"><div class="user-card"><div class="user-avatar">${currentUser.name.charAt(0)}</div><div class="user-info"><div class="user-name">${currentUser.name}</div><div class="user-role">${currentUser.position||currentUser.role}</div></div><button class="btn btn-icon btn-outline" onclick="logout()" title="Logout"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button></div></div></aside><main class="main-content"><div id="pageContent"></div></main></div><div class="modal-overlay" id="modalOverlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><h3 class="modal-title" id="modalTitle"></h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div></div>`;nav('dashboard')}
function nav(p){$$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===p));$('.sidebar')?.classList.remove('open');({dashboard:rDash,absen:rAbsen,riwayat:rRiwayat,cuti:rCuti,laporan:rLaporan,karyawan:rKaryawan})[p]()}
function rDash(){const today=new Date().toISOString().split('T')[0];const isAdmin=currentUser.role==='admin';const todayRec=db.attendance.find(a=>a.userId===currentUser.id&&a.date===today);const month=new Date().getMonth()+1;const year=new Date().getFullYear();const monthRecs=db.attendance.filter(a=>a.userId===currentUser.id&&new Date(a.date).getMonth()+1===month&&new Date(a.date).getFullYear()===year);const present=monthRecs.filter(a=>a.status==='present').length;const late=monthRecs.filter(a=>a.status==='late').length;let html=`<div class="topbar"><h1>Dashboard</h1></div>`;if(isAdmin){const totalEmp=db.users.filter(u=>u.role==='employee').length;const presentToday=db.attendance.filter(a=>a.date===today&&a.checkIn).length;html+=`<div class="stats-grid"><div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:var(--primary-bg);color:var(--primary)">👥</div></div><div class="stat-value">${totalEmp}</div><div class="stat-label">Total Karyawan</div></div><div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:var(--green-bg);color:var(--green)">✓</div></div><div class="stat-value">${presentToday}</div><div class="stat-label">Hadir Hari Ini</div></div><div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:var(--red-bg);color:var(--red)">✕</div></div><div class="stat-value">${totalEmp-presentToday}</div><div class="stat-label">Tidak Hadir</div></div><div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:var(--amber-bg);color:var(--amber)">⏰</div></div><div class="stat-value">${todayRec?fmtTime(todayRec.checkIn):'-'}</div><div class="stat-label">Check-in Hari Ini</div></div></div>`}else{html+=`<div class="stats-grid"><div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:var(--green-bg);color:var(--green)">✓</div></div><div class="stat-value">${present}</div><div class="stat-label">Hadir Bulan Ini</div></div><div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:var(--amber-bg);color:var(--amber)">⏰</div></div><div class="stat-value">${late}</div><div class="stat-label">Terlambat</div></div><div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:var(--red-bg);color:var(--red)">🤒</div></div><div class="stat-value">0</div><div class="stat-label">Sakit</div></div><div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:var(--purple-bg);color:var(--purple)">🏖</div></div><div class="stat-value">${db.leaves.filter(l=>l.userId===currentUser.id).length}</div><div class="stat-label">Cuti</div></div></div>`}html+=`<div class="two-col"><div class="card"><div class="card-header"><span class="card-title">Status Hari Ini</span></div><div class="card-body"><div style="text-align:center;padding:20px 0"><div style="font-size:48px;margin-bottom:8px">${todayRec?'✅':'⏳'}</div><div style="font-size:18px;font-weight:700;margin-bottom:4px">${todayRec?'Sudah Absen':'Belum Absen'}</div><div style="font-size:13px;color:var(--dim)">${todayRec?`Check-in: ${fmtTime(todayRec.checkIn)}${todayRec.checkOut?' | Check-out: '+fmtTime(todayRec.checkOut):''}`:'Klik menu Absen untuk check-in'}</div></div></div></div><div class="card"><div class="card-header"><span class="card-title">Riwayat Terakhir</span></div><div class="card-body">${db.attendance.filter(a=>a.userId===currentUser.id).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5).map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:600">${fmtDate(r.date)}</div><div style="font-size:11px;color:var(--dim)">${fmtTime(r.checkIn)} - ${fmtTime(r.checkOut)||'...'}</div></div><span class="badge badge-${r.status}">${r.status}</span></div>`).join('')||'<div style="text-align:center;color:var(--dim);padding:20px">Belum ada riwayat</div>'}</div></div></div>`;$('#pageContent').innerHTML=html}
function rAbsen(){const today=new Date().toISOString().split('T')[0];const todayRec=db.attendance.find(a=>a.userId===currentUser.id&&a.date===today);const now=new Date();let html=`<div class="topbar"><h1>Absen</h1></div><div class="card"><div class="card-body"><div class="attendance-clock"><div class="clock-time" id="clockTime">${now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div><div class="clock-date">${fmtDate(now)}</div><div class="clock-status ${todayRec?'checked-in':'not-in'}">${todayRec?'✓ Sudah Check-in':'○ Belum Check-in'}</div><div class="clock-actions">${!todayRec?`<button class="clock-btn checkin" onclick="doCheckIn()">Check In</button>`:!todayRec.checkOut?`<button class="clock-btn checkout" onclick="doCheckOut()">Check Out</button>`:'<div style="color:var(--dim);font-size:14px">Absen hari ini selesai ✓</div>'}</div></div></div></div>`;if(todayRec)html+=`<div class="card" style="margin-top:20px"><div class="card-header"><span class="card-title">Detail Absen Hari Ini</span></div><div class="card-body"><div class="stats-grid" style="grid-template-columns:repeat(3,1fr)"><div class="stat-card"><div class="stat-label">Check In</div><div class="stat-value" style="font-size:20px">${fmtTime(todayRec.checkIn)}</div></div><div class="stat-card"><div class="stat-label">Check Out</div><div class="stat-value" style="font-size:20px">${fmtTime(todayRec.checkOut)}</div></div><div class="stat-card"><div class="stat-label">Status</div><div class="stat-value" style="font-size:20px"><span class="badge badge-${todayRec.status}">${todayRec.status}</span></div></div></div></div></div>`;$('#pageContent').innerHTML=html;clearInterval(window._ci);window._ci=setInterval(()=>{const el=$('#clockTime');if(el)el.textContent=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000)}
function doCheckIn(){const today=new Date().toISOString().split('T')[0];const now=new Date().toTimeString().split(' ')[0];db.attendance.push({id:Date.now(),userId:currentUser.id,date:today,checkIn:now,checkOut:null,status:now>'08:00:00'?'late':'present'});saveDB(db);toast('Check-in berhasil!');rAbsen()}
function doCheckOut(){const today=new Date().toISOString().split('T')[0];const now=new Date().toTimeString().split(' ')[0];const rec=db.attendance.find(a=>a.userId===currentUser.id&&a.date===today);if(rec){rec.checkOut=now;saveDB(db);toast('Check-out berhasil!');rAbsen()}}
function rRiwayat(){const now=new Date();const month=now.getMonth()+1;const year=now.getFullYear();const recs=db.attendance.filter(a=>a.userId===currentUser.id&&new Date(a.date).getMonth()+1===month&&new Date(a.date).getFullYear()===year).sort((a,b)=>b.date.localeCompare(a.date));let html=`<div class="topbar"><h1>Riwayat Absensi</h1></div><div class="card"><div class="card-header"><span class="card-title">${now.toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</span></div><div class="card-body">`;if(recs.length===0)html+=`<div style="text-align:center;padding:40px;color:var(--dim)"><div style="font-size:48px;margin-bottom:12px;opacity:0.5">📋</div><p>Belum ada riwayat bulan ini</p></div>`;else{const weeks={};recs.forEach(r=>{const d=new Date(r.date);const ws=new Date(d);ws.setDate(d.getDate()-d.getDay());const k=ws.toISOString().split('T')[0];if(!weeks[k])weeks[k]=[];weeks[k].push(r)});const dn=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];Object.entries(weeks).forEach(([ws,days])=>{html+=`<div style="margin-bottom:20px"><div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase">Minggu ${ws}</div><div class="history-grid">`;for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);const ds=d.toISOString().split('T')[0];const rec=days.find(r=>r.date===ds);const isT=ds===now.toISOString().split('T')[0];html+=`<div class="history-day ${rec?rec.status:''}" ${isT?'style="border-color:var(--primary)"':''}><div class="day-name">${dn[i]}</div><div class="day-num">${d.getDate()}</div><div class="day-status">${rec?(rec.checkIn?fmtTime(rec.checkIn):rec.status):'-'}</div></div>`}html+=`</div></div>`})}html+=`</div></div>`;$('#pageContent').innerHTML=html}
function rCuti(){const recs=db.leaves.filter(l=>l.userId===currentUser.id);let html=`<div class="topbar"><h1>Pengajuan Cuti</h1><div class="topbar-actions"><button class="btn btn-primary btn-sm" onclick="showLeaveModal()">+ Ajukan Cuti</button></div></div><div class="card"><div class="card-body"><div class="table-container"><table><thead><tr><th>Jenis</th><th>Dari</th><th>Sampai</th><th>Alasan</th><th>Status</th></tr></thead><tbody>${recs.length===0?'<tr><td colspan="5" style="text-align:center;color:var(--dim);padding:32px">Belum ada pengajuan cuti</td></tr>':''}${recs.map(r=>`<tr><td style="font-weight:600">${r.type}</td><td>${r.startDate}</td><td>${r.endDate}</td><td style="color:var(--dim)">${r.reason||'-'}</td><td><span class="badge badge-${r.status}">${r.status}</span></td></tr>`).join('')}</tbody></table></div></div></div>`;$('#pageContent').innerHTML=html}
function showLeaveModal(){$('#modalTitle').textContent='Ajukan Cuti';$('#modalBody').innerHTML=`<div class="form-group"><label>Jenis Cuti</label><select class="form-input" id="leaveType"><option>Cuti Tahunan</option><option>Cuti Sakit</option><option>Cuti Melahirkan</option><option>Cuti Urusan Penting</option></select></div><div class="form-group"><label>Dari Tanggal</label><input type="date" class="form-input" id="leaveStart"></div><div class="form-group"><label>Sampai Tanggal</label><input type="date" class="form-input" id="leaveEnd"></div><div class="form-group"><label>Alasan</label><textarea class="form-input" id="leaveReason" rows="3" placeholder="Alasan cuti..."></textarea></div>`;$('#modalFooter').innerHTML=`<button class="btn btn-outline btn-sm" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="submitLeave()">Kirim</button>`;$('#modalOverlay').classList.add('show')}
function submitLeave(){db.leaves.push({id:Date.now(),userId:currentUser.id,type:$('#leaveType').value,startDate:$('#leaveStart').value,endDate:$('#leaveEnd').value,reason:$('#leaveReason').value,status:'pending'});saveDB(db);closeModal();toast('Pengajuan cuti berhasil!');rCuti()}
function rLaporan(){const today=new Date().toISOString().split('T')[0];let html=`<div class="topbar"><h1>Laporan Absensi</h1></div><div class="filter-bar"><input type="date" id="reportDate" value="${today}" onchange="loadReport()"></div><div class="card"><div class="card-body"><div class="table-container"><table><thead><tr><th>Nama</th><th>Department</th><th>Posisi</th><th>Check In</th><th>Check Out</th><th>Status</th></tr></thead><tbody id="reportBody">${getReportRows(today)}</tbody></table></div></div></div>`;$('#pageContent').innerHTML=html}
function getReportRows(date){const recs=db.attendance.filter(a=>a.date===date);if(recs.length===0)return'<tr><td colspan="6" style="text-align:center;color:var(--dim);padding:32px">Tidak ada data untuk tanggal ini</td></tr>';return recs.map(r=>{const u=db.users.find(u=>u.id===r.userId);return`<tr><td style="font-weight:600">${u?.name||'Unknown'}</td><td>${u?.department||'-'}</td><td style="color:var(--dim)">${u?.position||'-'}</td><td>${fmtTime(r.checkIn)}</td><td>${fmtTime(r.checkOut)}</td><td><span class="badge badge-${r.status}">${r.status}</span></td></tr>`}).join('')}
function loadReport(){$('#reportBody').innerHTML=getReportRows($('#reportDate').value)}
function rKaryawan(){const users=db.users;let html=`<div class="topbar"><h1>Manajemen Karyawan</h1><div class="topbar-actions"><button class="btn btn-primary btn-sm" onclick="showAddEmpModal()">+ Tambah</button></div></div><div class="card"><div class="card-body"><div class="table-container"><table><thead><tr><th>Nama</th><th>Email</th><th>Department</th><th>Posisi</th><th>Role</th><th>Aksi</th></tr></thead><tbody>${users.map(u=>`<tr><td style="font-weight:600">${u.name}</td><td style="color:var(--dim)">${u.email}</td><td>${u.department}</td><td>${u.position}</td><td><span class="badge ${u.role==='admin'?'badge-approved':'badge-present'}">${u.role}</span></td><td><button class="btn btn-outline btn-sm" onclick='showEditEmp(${JSON.stringify(u)})'>Edit</button> ${u.id!==currentUser.id?`<button class="btn btn-danger btn-sm" onclick="delEmp(${u.id})">Hapus</button>`:''}</td></tr>`).join('')}</tbody></table></div></div></div>`;$('#pageContent').innerHTML=html}
function showAddEmpModal(){$('#modalTitle').textContent='Tambah Karyawan';$('#modalBody').innerHTML=`<div class="form-group"><label>Nama</label><input class="form-input" id="empName" placeholder="Nama lengkap"></div><div class="form-group"><label>Email</label><input type="email" class="form-input" id="empEmail" placeholder="email@company.com"></div><div class="form-group"><label>Password</label><input type="password" class="form-input" id="empPassword" placeholder="Password"></div><div class="form-group"><label>Department</label><input class="form-input" id="empDept" placeholder="Engineering, Marketing, etc."></div><div class="form-group"><label>Posisi</label><input class="form-input" id="empPos" placeholder="Software Developer"></div>`;$('#modalFooter').innerHTML=`<button class="btn btn-outline btn-sm" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="addEmp()">Tambah</button>`;$('#modalOverlay').classList.add('show')}
function addEmp(){db.users.push({id:db.nextId++,name:$('#empName').value,email:$('#empEmail').value,password:$('#empPassword').value,role:'employee',department:$('#empDept').value,position:$('#empPos').value});saveDB(db);closeModal();toast('Karyawan ditambahkan!');rKaryawan()}
function showEditEmp(u){$('#modalTitle').textContent='Edit Karyawan';$('#modalBody').innerHTML=`<div class="form-group"><label>Nama</label><input class="form-input" id="empName" value="${u.name}"></div><div class="form-group"><label>Email</label><input type="email" class="form-input" id="empEmail" value="${u.email}"></div><div class="form-group"><label>Department</label><input class="form-input" id="empDept" value="${u.department}"></div><div class="form-group"><label>Posisi</label><input class="form-input" id="empPos" value="${u.position}"></div><div class="form-group"><label>Role</label><select class="form-input" id="empRole"><option value="employee" ${u.role==='employee'?'selected':''}>Employee</option><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option></select></div>`;$('#modalFooter').innerHTML=`<button class="btn btn-outline btn-sm" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-sm" onclick="updEmp(${u.id})">Simpan</button>`;$('#modalOverlay').classList.add('show')}
function updEmp(id){const u=db.users.find(u=>u.id===id);if(u){u.name=$('#empName').value;u.email=$('#empEmail').value;u.department=$('#empDept').value;u.position=$('#empPos').value;u.role=$('#empRole').value;saveDB(db);closeModal();toast('Karyawan diperbarui!');rKaryawan()}}
function delEmp(id){if(!confirm('Hapus karyawan ini?'))return;db.users=db.users.filter(u=>u.id!==id);db.attendance=db.attendance.filter(a=>a.userId!==id);saveDB(db);toast('Karyawan dihapus!');rKaryawan()}
function closeModal(){$('#modalOverlay').classList.remove('show')}
function logout(){currentUser=null;clearInterval(window._ci);renderLogin()}
renderLogin();
</script>
</body>
</html>
